# Server configuration
# NOTE: 8080 is taken by the local llama.cpp server, so the app runs on 8081.
server.port=8081

# H2 Database Configuration
# File mode -> data persists across restarts under ./data/claims.mv.db.
# AUTO_SERVER allows the H2 console / external tools to connect while the app runs.
spring.datasource.url=jdbc:h2:file:./data/claims;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
# 'update' keeps the schema in sync without dropping the persisted data each run.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Application name
spring.application.name=claims-agent-system

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ---------------------------------------------------------------------------
# Spring AI -> local llama.cpp (OpenAI-compatible) server
# ---------------------------------------------------------------------------
# llama.cpp exposes /v1/chat/completions at this base URL. The API key is
# ignored by llama.cpp but Spring AI requires a non-empty value.
spring.ai.openai.base-url=http://localhost:8080
spring.ai.openai.api-key=sk-no-key-required
# Model id as reported by GET /v1/models on the llama.cpp server.
spring.ai.openai.chat.options.model=sha256-1194192cf2a187eb02722edcc3f77b11d21f537048ce04b67ccf8ba78863006a
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.chat.options.max-tokens=1024
# This project only uses chat; disable embedding auto-config (llama.cpp has no embeddings endpoint here).
spring.ai.model.embedding=none

# Logging
logging.level.com.insurance.claims=DEBUG
logging.level.org.springframework.web=INFO